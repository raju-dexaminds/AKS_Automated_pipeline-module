name: Build and Deploy Application (Helm)

on:
  push:
    branches:
      - master
    paths:
      - backend/**
      - frontend/**
      - docker/**
      - helm/**
      - .github/workflows/deploy_app.yml

permissions:
  id-token: write
  contents: read

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Backend Image
        run: |
          docker build -f docker/backend.Dockerfile \             
            -t ${{ secrets.ACR_NAME }}.azurecr.io/backend:${{ github.sha }} .

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}

      - name: Build Frontend Image
        run: |
          docker build -f docker/frontend.Dockerfile \             
            -t ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} .

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \             
            --resource-group ${{ secrets.RESOURCE_GROUP }} \             
            --name ${{ secrets.AKS_CLUSTER }} \             
            --overwrite-existing

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy Helm Chart
        run: |
          helm upgrade --install fullstack-app helm/fullstack-chart \             
            --set backend.image=${{ secrets.ACR_NAME }}.azurecr.io/backend:${{ github.sha }} \             
            --set frontend.image=${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
