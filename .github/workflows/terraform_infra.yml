name: Terraform AKS Infrastructure

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action"
        required: true
        default: Apply
        type: choice
        options:
          - Apply
          - Destroy

      VAR_FILE:
        description: "Terraform variable file"
        required: true
        default: Vars/dev.tfvars
        type: choice
        options:
          - Vars/dev.tfvars
          - Vars/prod.tfvars

      STATE_FILE:
        description: "Terraform state file"
        required: true
        default: dev-aks.tfstate
        type: choice
        options:
          - dev-aks.tfstate
          - prod-aks.tfstate


permissions:
  id-token: write
  contents: read


jobs:

  terraform-lint:
    name: Terraform Lint
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install TFLint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Run TFLint
        run: |
          cd terraform/environments/dev
          tflint --init
          tflint


  terraform-plan:
    name: Terraform Plan
    needs: terraform-lint
    runs-on: ubuntu-latest

    outputs:
      tf_action: ${{ steps.vars.outputs.tf_action }}
      tfvars: ${{ steps.vars.outputs.tfvars }}
      state_file: ${{ steps.vars.outputs.state_file }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Variables
        id: vars
        run: |
          echo "tf_action=${{ github.event.inputs.terraform_action }}" >> $GITHUB_OUTPUT
          echo "tfvars=${{ github.event.inputs.VAR_FILE }}" >> $GITHUB_OUTPUT
          echo "state_file=${{ github.event.inputs.STATE_FILE }}" >> $GITHUB_OUTPUT

      - name: Terraform Init
        run: |
          cd terraform/environments/dev
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE }}" \
            -backend-config="container_name=tfakscontainer" \
            -backend-config="key=${{ github.event.inputs.STATE_FILE }}"

      - name: Terraform Plan
        run: |
          cd terraform/environments/dev
          terraform plan \
            -var-file=${{ github.event.inputs.VAR_FILE }}


  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    if: needs.terraform-plan.outputs.tf_action == 'Apply'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          cd terraform/environments/dev
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ needs.terraform-plan.outputs.state_file }}"

      - name: Terraform Apply
        run: |
          cd terraform/environments/dev
          terraform apply -var-file="./Vars/dev.tfvars" -auto-approve


  terraform-destroy:
    name: Terraform Destroy
    needs: terraform-plan
    if: needs.terraform-plan.outputs.tf_action == 'Destroy'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          cd terraform/environments/dev
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ needs.terraform-plan.outputs.state_file }}"

      - name: Terraform Destroy
        run: |
          cd terraform/environments/dev
          terraform destroy -var-file="${{ needs.terraform-plan.outputs.tfvars }}" -auto-approve
